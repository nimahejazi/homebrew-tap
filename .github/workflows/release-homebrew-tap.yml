name: Release Homebrew Tap

on:
  push:
    tags:
      - 'v*'

jobs:
  update-tap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: nimahejazi/homebrew-tap
          path: ./tap

      - name: Get version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download source tarball
        run: |
          cd ./tap
          curl -L "https://github.com/anomalyco/ask/archive/refs/tags/v${{ steps.version.outputs.VERSION }}.tar.gz" -o ask.tar.gz
          SHA256=$(shasum -a 256 ask.tar.gz | cut -d' ' -f1)
          echo "SHA256=$SHA256" >> $GITHUB_OUTPUT

      - name: Update formula
        run: |
          cd ./tap
          cat > nh-ask-cli.rb << EOF
class NhAskCli < Formula
  desc "AI CLI tool for natural language interaction with LLMs"
  homepage "https://github.com/anomalyco/ask"
  url "https://github.com/anomalyco/ask/archive/refs/tags/v${{ steps.version.outputs.VERSION }}.tar.gz"
  sha256 "${{ steps.sha256.outputs.SHA256 }}"
  license "MIT"

  depends_on "python@3.8" => :since

  def install
    system "pip3", "install", "-e", "."
  end

  test do
    system "ask", "--help"
  end
end
EOF

      - name: Commit and push
        run: |
          cd ./tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nh-ask-cli.rb
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update nh-ask-cli to v${{ steps.version.outputs.VERSION }}"
            git push origin main
          fi
